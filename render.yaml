services:
  # Backend Web Service
  - type: web
    name: ims-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_URL
        fromDatabase:
          name: ims-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ims-redis
          property: connectionString
      - key: MONGODB_URL
        sync: false # Set this manually in Render dashboard to your MongoDB Atlas URL
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app # Change this to your Vercel URL

# Databases
databases:
  - name: ims-db
    plan: free
    postgresMajorVersion: 16

# Redis
redis:
  - name: ims-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
