databases:
  - name: ims-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: ims-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_URL
        fromDatabase:
          name: ims-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Set this manually to the Internal Redis URL
      - key: MONGODB_URL
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app
